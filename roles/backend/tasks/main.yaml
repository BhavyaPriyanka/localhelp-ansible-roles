- name: create application user
  become: true
  ansible.builtin.user:
    name: localhelp
    system: true
    create_home: true


- name: install base packages
  become: true
  ansible.builtin.dnf:
    name:
      - java-17-amazon-corretto
      - python3-pip
      - mariadb105
    state: present


- name: install python dependencies for mysql module
  become: true
  ansible.builtin.pip:
    name:
      - PyMySQL
      - cryptography
    executable: pip3


- name: ensure application directory exists
  become: true
  ansible.builtin.file:
    path: /opt/localhelp/backend
    state: directory
    owner: localhelp
    group: localhelp
    mode: "0755"


- name: download snapshot jar from nexus
  become: true
  ansible.builtin.get_url:
    url: "{{ nexus_url }}/repository/{{ component }}/com/localhelp/{{ component }}/{{ app_version }}/{{ component }}-{{ app_version }}.jar"
    dest: "/opt/localhelp/backend/app.jar"
    owner: localhelp
    group: localhelp
    mode: "0644"


- name: verify downloaded jar
  become: true
  ansible.builtin.command:
    cmd: ls -lh /opt/localhelp/backend/app.jar
  register: jar_check
  changed_when: false


- name: display jar details
  ansible.builtin.debug:
    msg: "{{ jar_check.stdout }}"


- name: import database schema
  become: true
  community.mysql.mysql_db:
    login_user: "{{ login_user }}"
    login_password: "{{ login_password }}"
    login_host: "{{ login_host }}"
    target: "{{ db_script_path }}"
    state: import
    name: all

- name: copy database schema file
  become: true
  ansible.builtin.copy:
    src: init.sql
    dest: /opt/localhelp/backend/init.sql
    owner: localhelp
    group: localhelp
    mode: "0644"


- name: deploy systemd service
  become: true
  ansible.builtin.template:
    src: backend.service.j2
    dest: /etc/systemd/system/backend.service
    mode: "0644"


- name: reload systemd daemon
  become: true
  ansible.builtin.systemd:
    daemon_reload: true


- name: restart backend service
  become: true
  ansible.builtin.systemd:
    name: backend
    state: restarted
    enabled: true