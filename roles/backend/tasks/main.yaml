- name: create application user
  become: true
  ansible.builtin.user:
    name: localhelp
    system: yes
    create_home: yes

- name: install base packages
  ansible.builtin.dnf:
    name:
      - git
      - java-17-amazon-corretto
      - maven
      - python3-pip
      - mariadb105
    state: present

- name: install python dependencies for mysql module
  ansible.builtin.pip:
    name:
      - PyMySQL
      - cryptography
    executable: pip3

- name: ensure parent directory exists
  ansible.builtin.file:
    path: /opt/localhelp
    state: directory
    mode: "0755"

- name: fix ownership for app directory
  ansible.builtin.file:
    path: /opt/localhelp
    owner: localhelp
    group: localhelp
    state: directory

- name: force remove old repo
  ansible.builtin.file:
    path: /opt/localhelp/backend
    state: absent

- name: clone backend repo (clean)
  ansible.builtin.git:
    repo: "https://github.com/sbp828/localhelp-backend.git"
    dest: /opt/localhelp/backend
    version: main
    force: true
    clone: true
    update: false

- name: build springboot application
  ansible.builtin.command: mvn clean package -DskipTests
  args:
    chdir: /opt/localhelp/backend

- name: find built jar
  ansible.builtin.shell: find /opt/localhelp/backend/target -name "*.jar" | head -n 1
  register: jar_path
  changed_when: false

- name: set jar fact
  ansible.builtin.set_fact:
    app_jar: "{{ jar_path.stdout }}"

- name: create runtime directory
  ansible.builtin.file:
    path: /app/localhelp-backend
    state: directory
    owner: localhelp
    group: localhelp
    mode: "0755"

- name: copy jar to runtime location
  ansible.builtin.copy:
    src: "{{ app_jar }}"
    dest: /app/localhelp-backend/app.jar
    remote_src: true
    owner: localhelp
    group: localhelp
    mode: "0755"

- name: import database schema
  community.mysql.mysql_db:
    login_user: "{{ login_user }}"
    login_password: "{{ login_password }}"
    login_host: "{{ login_host }}"
    target: "/opt/localhelp/backend/db/init.sql"
    state: import
    name: all

- name: deploy systemd service
  ansible.builtin.template:
    src: backend.service.j2
    dest: /etc/systemd/system/backend.service
    mode: "0644"

- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: start backend service
  ansible.builtin.systemd:
    name: backend
    state: restarted
    enabled: true