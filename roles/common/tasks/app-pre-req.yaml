- name: delete app directory
  ansible.builtin.file:
    path: "{{ app_location }}"
    state: absent

- name: create app directory
  ansible.builtin.file:
    path: "{{ app_location }}"
    state: directory

- name: clone repo
  ansible.builtin.git:
    repo: "https://github.com/sbp828/localhelp-frontend"
    dest: "{{ app_location }}"
    version: main
    force: yes
    update: yes

- name: install nodejs and npm
  ansible.builtin.dnf:
    name: nodejs
    state: present
  become: yes

- name: install dependencies
  ansible.builtin.command: npm install
  args:
    chdir: "{{ app_location }}"

- name: build frontend
  ansible.builtin.command: npm run build
  args:
    chdir: "{{ app_location }}"

- name: deploy frontend
  ansible.builtin.shell: |
    rm -rf /usr/share/nginx/html/*
    cp -r {{ app_location }}/build/* /usr/share/nginx/html/
  become: yes