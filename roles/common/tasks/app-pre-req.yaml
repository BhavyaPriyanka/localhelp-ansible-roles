- name: delete app directory
  ansible.builtin.file:
    path: "{{ app_location }}"
    state: absent

- name: create app directory
  ansible.builtin.file:
    path: "{{ app_location }}"
    state: directory

- name: clone repo
  ansible.builtin.git:
    repo: "https://github.com/BhavyaPriyanka/localhelp-frontend"
    dest: "{{ app_location }}"
    version: main
    force: yes
    update: yes

- name: install nodejs and npm
  ansible.builtin.dnf:
    name: nodejs
    state: present
  become: yes

- name: install dependencies
  ansible.builtin.command: npm install
  args:
    chdir: "{{ app_location }}"

- name: build frontend
  ansible.builtin.command: npm run build
  args:
    chdir: "{{ app_location }}"

- name: show app_location
  ansible.builtin.debug:
    var: app_location

- name: verify build folder
  ansible.builtin.command: ls -la {{ app_location }}/build
  register: build_check

- debug:
    var: build_check.stdout

- name: deploy frontend
  ansible.builtin.copy:
    src: "{{ app_location }}/build/"
    dest: /usr/share/nginx/html/
    remote_src: yes
  become: yes