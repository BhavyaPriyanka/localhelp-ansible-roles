- name: Delete old app directory
  ansible.builtin.file:
    path: "{{ app_location }}"
    state: absent

- name: Create app directory
  ansible.builtin.file:
    path: "{{ app_location }}"
    state: directory

- name: Download frontend artifact
  ansible.builtin.get_url:
    url: "{{ nexus_url }}/repository/{{ component }}/com/localhelp/{{ component }}/{{ app_version }}/{{ component }}-{{ app_version }}.zip"
    dest: "{{ app_location }}/{{ component }}.zip"

- name: Extract frontend artifact
  ansible.builtin.unarchive:
    src: "{{ app_location }}/{{ component }}.zip"
    dest: "{{ app_location }}"
    remote_src: yes

- name: Remove old frontend files
  ansible.builtin.shell: rm -rf /usr/share/nginx/html/*

- name: Copy frontend files
  ansible.builtin.copy:
    src: "{{ app_location }}/build/"
    dest: /usr/share/nginx/html/
    remote_src: yes