- name: delete app directory
  ansible.builtin.file:
    path: "{{ app_location }}"
    state: absent
  #ignore_errors: yes

- name: create app directory
  ansible.builtin.file:
    path: "{{ app_location }}"
    state: directory

- name: download the code from github
  ansible.builtin.git:
    repo: "https://github.com/sbp828/localhelp-frontend"
    dest: "{{ app_location }}"
    version: main
    force: yes
    update: yes